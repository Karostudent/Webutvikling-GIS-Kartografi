<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Webkart Oppgave 1</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="map"></div>

  <div id="nearestBox" class="panel panel-top">
    <b>Nærmeste tilfluktsrom</b>
    <div id="nearestText">Klikk i kartet for å beregne avstand.</div>
  </div>

  <div id="results" class="panel panel-middle">
    <b>Tilfluktsrom innen radius:</b>
    <div id="resultsList">Klikk i kartet for å søke.</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
